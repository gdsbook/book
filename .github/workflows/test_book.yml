name: Render check

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  render:
    name: quarto render (from _freeze)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.6.43

      # Validates the book renders cleanly from the committed _freeze/ cache.
      # Does not deploy. Fails if a .qmd changed without its freeze reseeded.
      - name: Render HTML
        run: quarto render --to html
