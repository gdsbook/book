name: Build and deploy book
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.6.43

      # Renders from the committed _freeze/ cache, so no geo conda env is
      # needed. If a .qmd changed without its _freeze/ being reseeded locally,
      # this step will fail (Quarto will try to execute without a kernel) —
      # that's the signal to re-run `make freeze` and commit the cache.
      - name: Render HTML
        run: quarto render --to html

      - name: Commit and push docs
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs
          git commit -m "CI: build book HTML" || echo "No changes to commit"
          git push
